name: production-deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build
        run: npm run build
      
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy out/ --project-name=cerenth-website
      
      - name: Log deployment
        run: |
          echo "✅ Production deployment completed at $(date)" > deployment.log
          echo "Commit: ${{ github.sha }}" >> deployment.log
          echo "Deployed by: ${{ github.actor }}" >> deployment.log
      
      - name: Upload deployment log
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-log-${{ github.run_number }}
          path: deployment.log
          retention-days: 90
